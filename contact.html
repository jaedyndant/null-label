<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — NULL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="custom-cursor"></div>
  <div class="loader"><div class="loader__lace"></div></div>


  <aside class="sidebar">
    <a href="index.html" class="sidebar__logo">NULL</a>
    <nav class="sidebar__nav">
      <a href="index.html" class="sidebar__link">Home</a>
      <a href="about.html" class="sidebar__link">About</a>
      <a href="roster.html" class="sidebar__link">Roster</a>
      <a href="releases.html" class="sidebar__link">Releases</a>
      <a href="contact.html" class="sidebar__link">Contact</a>
    </nav>
    <div class="sidebar__lace"><div class="lace-doily"></div></div>
    <div class="sidebar__social">
      <a href="#" class="sidebar__social-link">SC</a>
      <a href="#" class="sidebar__social-link">IG</a>
      <a href="#" class="sidebar__social-link">BC</a>
    </div>
  </aside>
  <header class="mobile-header">
    <a href="index.html" class="mobile-logo">NULL</a>
    <button class="mobile-hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
  </header>
  <div class="mobile-overlay">
    <nav class="mobile-overlay__nav">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="roster.html">Roster</a>
      <a href="releases.html">Releases</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>


  <main class="main">
    <div class="contact-split">
      <div class="contact-info">
        <span class="section-label">Get in Touch</span>
        <h2>Let's talk about<br>what matters.</h2>
        <div class="contact-details">
          <p>
            NULL Label GmbH<br>
            Oranienstra&szlig;e 185<br>
            10999 Berlin, Germany
          </p>
          <p style="margin-top: 24px;">
            info@null-label.berlin<br>
            demos@null-label.berlin
          </p>
        </div>
        <div class="contact-social">
          <a href="#">SoundCloud</a>
          <a href="#">Instagram</a>
          <a href="#">Bandcamp</a>
          <a href="#">Resident Advisor</a>
        </div>
        <div class="lace-frame-canvas"></div>
      </div>

      <div class="contact-form-wrap">
        <form class="contact-form" onsubmit="return false;">
          <label for="name">Your Name</label>
          <input type="text" id="name" name="name" required>

          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required>

          <label for="subject">Subject</label>
          <select id="subject" name="subject">
            <option value="">Select a subject</option>
            <option value="demo">Demo Submission</option>
            <option value="booking">Booking Enquiry</option>
            <option value="press">Press / Media</option>
            <option value="licensing">Licensing</option>
            <option value="other">Other</option>
          </select>

          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" required></textarea>

          <button type="submit">Send Message</button>
        </form>
      </div>
    </div>
  </main>


  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="lace.js"></script>
  <script src="app.js"></script>

</body>
</html>
